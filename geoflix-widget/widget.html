<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<style>
html,body{margin:0;padding:0;background:transparent}
#root{min-height:40px}
#root img,#root video{width:100%;height:auto;display:block;border-radius:12px}
#log{color:#9aa3b2;font:11px ui-monospace,Menlo,monospace;padding:8px;white-space:pre-wrap}
</style></head>
<body><div id="root"><div id="log">Geoflix · loading…</div></div>
<script>
(function(){
  var root=document.getElementById('root'), logEl=document.getElementById('log');
  var lines=[]; function log(s){ lines.push(s); if(logEl) logEl.textContent=lines.slice(-12).join('\n'); }
  var done=false;
  function reportSize(){
    var h=Math.ceil(document.documentElement.scrollHeight||document.body.scrollHeight);
    var w=Math.ceil(document.documentElement.scrollWidth||document.body.scrollWidth);
    if(h>0) send({jsonrpc:'2.0',method:'ui/notifications/size-changed',params:{width:w,height:h}});
  }
  function render(url,kind){
    if(done) return; done=true;
    var el=document.createElement(kind==='video'?'video':'img');
    el.src=url;
    if(kind==='video'){ el.controls=el.autoplay=el.loop=el.muted=el.playsInline=true; el.addEventListener('loadedmetadata',reportSize); }
    else { el.alt='generated'; el.addEventListener('load',reportSize); }
    root.innerHTML=''; root.appendChild(el);
    // also report after layout settles (covers cached media / late layout)
    setTimeout(reportSize,80); setTimeout(reportSize,400);
  }
  // Find a renderable media url (data: URI, http(s), or a {url}/{image} field) anywhere in the message.
  function findMedia(o,d){
    if(o==null||d>10) return null;
    if(typeof o==='string') return /^data:(image|video)\//.test(o) ? {url:o,kind:/^data:video/.test(o)?'video':'image'} : null;
    if(typeof o==='object'){
      if(typeof o.image==='string' && /^data:/.test(o.image)) return {url:o.image, kind:'image'};
      if(typeof o.url==='string' && /^(https?:|data:)/.test(o.url)) return {url:o.url, kind:o.kind||'image'};
      for(var k in o){ var r=findMedia(o[k],d+1); if(r) return r; }
    }
    return null;
  }
  var idc=0;
  function send(m){ try{ parent.postMessage(m,'*'); }catch(e){} }
  // Correct MCP-Apps init: params use protocolVersion + appInfo + appCapabilities.
  function initialize(){
    send({jsonrpc:'2.0',id:++idc,method:'ui/initialize',params:{
      protocolVersion:'2026-01-26',
      appInfo:{name:'geoflix',version:'1.0.0'},
      appCapabilities:{}
    }});
    log('init');
  }
  window.addEventListener('message',function(ev){
    var d=ev.data; if(!d||typeof d!=='object') return;
    if(d.method) log('recv '+d.method);
    if(d.method==='ui/notifications/sandbox-proxy-ready') initialize();
    if(d.id && d.result && d.result.protocolVersion){ send({jsonrpc:'2.0',method:'ui/notifications/initialized'}); }
    var f=findMedia(d,0); if(f) render(f.url,f.kind);
  });
  initialize();
})();
</script>
</body></html>
